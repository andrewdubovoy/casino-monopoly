<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Батл Монополия</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="particles" aria-hidden="true">
      <span class="particle"></span><span class="particle"></span>
      <span class="particle"></span><span class="particle"></span>
      <span class="particle"></span><span class="particle"></span>
      <span class="particle"></span><span class="particle"></span>
      <span class="particle"></span><span class="particle"></span>
      <span class="particle"></span><span class="particle"></span>
    </div>

    <!-- ЭКРАН 1: БАТЛ -->
    <div id="screen1" class="screen active">
      <div class="s1-inner">
        <div class="player-card anim-left">
          <div class="avatar-frame">
            <img class="avatar" src="/images/left-avatar.png" alt="left avatar" />
          </div>
          <div class="player-name">MALOYCSER</div>
        </div>

        <div class="center center-block">
          <div class="bg-glow" aria-hidden="true"></div>
          <div class="vs-label">VS</div>
          <h1 class="title">БАТЛ<br/>МОНОПОЛИЯ</h1>
          <div class="tag">С DRAGON MONEY</div>
          <div class="subtitle">КТО СТАНЕТ БОГАТЕЙШИМ?</div>
          <button id="play" class="play-btn" onclick="transitionTo(2)">🎲 ИГРАТЬ!</button>
        </div>

        <div class="player-card anim-right">
          <div class="avatar-frame">
            <span class="boss-badge">👑 БОСС</span>
            <img class="avatar" src="/images/right-avatar.png" alt="right avatar" />
          </div>
          <div class="player-name">DRAGON MONEY</div>
        </div>
      </div>
    </div>

    <!-- ЭКРАН 2: СТАРТОВЫЙ КАПИТАЛ -->
    <div id="screen2" class="screen">
      <div class="s2-inner">
        <div class="s2-icon">💰</div>
        <h2 class="s2-title">СТАРТОВЫЙ<br/><span class="s2-title-gold">КАПИТАЛ</span></h2>
        <p class="s2-sub">СКОЛЬКО ДЕНЕГ У MALOYCSER?</p>

        <div class="capital-card">
          <div class="quick-label">БЫСТРЫЙ ВЫБОР</div>
          <div class="quick-btns">
            <button class="quick-btn active" data-val="1500">1 500 ₽</button>
            <button class="quick-btn" data-val="3000">3 000 ₽</button>
            <button class="quick-btn" data-val="5000">5 000 ₽</button>
            <button class="quick-btn" data-val="10000">10 000 ₽</button>
          </div>

          <div class="manual-label">ИЛИ ВВЕДИ ВРУЧНУЮ</div>
          <div class="input-wrap">
            <input id="capital-input" class="capital-input" type="number" value="1500" min="1" />
            <span class="ruble-sign">₽</span>
          </div>

          <button class="start-btn" onclick="startGame()">🎲 НАЧАТЬ ИГРУ!</button>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
